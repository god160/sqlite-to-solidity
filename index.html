<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQLite → Solidity Query Generator | Tableland</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,sans-serif;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:2rem}
h1{color:#58a6ff;margin-bottom:1rem}
h2{color:#58a6ff;font-size:1.2rem;margin:1.5rem 0 0.5rem}
.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:1.5rem;margin:1rem 0}
label{display:block;color:#8b949e;margin-bottom:0.3rem;font-size:0.9rem}
select,input,textarea{width:100%;padding:0.6rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-family:monospace;font-size:0.9rem}
textarea{min-height:150px;resize:vertical}
.row{display:flex;gap:1rem;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
button{background:#238636;color:white;border:none;padding:0.7rem 1.5rem;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:bold}
button:hover{background:#2ea043}
button.secondary{background:#21262d;border:1px solid #30363d}
.output{background:#0d1117;padding:1rem;border-radius:6px;border:1px solid #30363d;min-height:100px;white-space:pre-wrap;word-break:break-all}
.hint{color:#8b949e;font-size:0.8rem;margin-top:0.3rem}
table{width:100%;border-collapse:collapse;margin:0.5rem 0}
th,td{padding:0.5rem;text-align:left;border:1px solid #30363d}
th{background:#161b22}
.add-btn{background:#1f6feb;color:white;padding:0.3rem 0.8rem;border-radius:4px;cursor:pointer;border:none;font-size:0.8rem}
.remove-btn{background:#da3633;color:white;padding:0.2rem 0.5rem;border-radius:4px;cursor:pointer;border:none;font-size:0.7rem}
pre{margin:0}
code{color:#7ee787}
</style>
</head>
<body>
<div class="container">
<h1>🔧 SQLite → Solidity Query Generator</h1>
<p class="hint">Generate Solidity <code>string.concat</code> statements for Tableland queries</p>

<div class="panel">
<h2>1. SQL Operation</h2>
<div class="row">
<select id="sqlVerb">
<option value="SELECT">SELECT</option>
<option value="INSERT INTO">INSERT INTO</option>
<option value="UPDATE">UPDATE</option>
<option value="DELETE FROM">DELETE FROM</option>
<option value="CREATE TABLE">CREATE TABLE</option>
</select>
<input id="tableName" placeholder="table_name" value="my_table_80001_1">
</div>
</div>

<div class="panel" id="columnsPanel">
<h2>2. Columns / Values</h2>
<table id="columnsTable">
<tr><th>Column/Value</th><th>Type</th><th></th></tr>
<tr><td><input class="col-input" placeholder="column_name"></td>
<td><select class="col-type"><option>string</option><option>int</option><option>address</option><option>bytes</option></select></td>
<td><button class="remove-btn" onclick="removeRow(this)">x</button></td></tr>
</table>
<button class="add-btn" onclick="addRow()">+ Add Column</button>
</div>

<div class="panel" id="wherePanel">
<h2>3. WHERE Clause (optional)</h2>
<div class="row">
<input id="whereCol" placeholder="column_name">
<select id="whereOp"><option>=</option><option>></option><option><</option><option>>=</option><option><=</option><option>!=</option><option>LIKE</option></select>
<input id="whereVal" placeholder="value">
</div>
</div>

<div class="panel">
<h2>4. Generated Solidity Code</h2>
<button onclick="generate()">🔄 Generate</button>
<button class="secondary" onclick="copyOutput()">📋 Copy</button>
<div class="output" id="output">Click Generate to create Solidity code...</div>
</div>
</div>

<script>
function addRow() {
    const table = document.getElementById('columnsTable');
    const row = table.insertRow(-1);
    row.innerHTML = `
        <td><input class="col-input" placeholder="column_name"></td>
        <td><select class="col-type"><option>string</option><option>int</option><option>address</option><option>bytes</option></select></td>
        <td><button class="remove-btn" onclick="removeRow(this)">x</button></td>`;
}

function removeRow(btn) {
    const table = document.getElementById('columnsTable');
    if (table.rows.length > 2) btn.closest('tr').remove();
}

function escapeSolidity(str) {
    return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function generate() {
    const verb = document.getElementById('sqlVerb').value;
    const table = document.getElementById('tableName').value || 'my_table';
    const rows = document.querySelectorAll('#columnsTable tr');
    
    let cols = [];
    for (let i = 1; i < rows.length; i++) {
        const input = rows[i].querySelector('.col-input');
        const type = rows[i].querySelector('.col-type');
        if (input && input.value) {
            cols.push({name: input.value, type: type ? type.value : 'string'});
        }
    }
    
    if (cols.length === 0) {
        cols = [{name: 'column1', type: 'string'}];
    }

    const whereCol = document.getElementById('whereCol').value;
    const whereOp = document.getElementById('whereOp').value;
    const whereVal = document.getElementById('whereVal').value;

    // Build query
    let parts = [];
    parts.push(`"${verb} "`);
    
    if (verb === 'INSERT INTO') {
        parts.push(`"${table} ("`);
        parts.push(cols.map(c => `"${c.name}"`).join(', \n    ",\\"'));
        parts.push(`"\\") VALUES ("`);
        parts.push(cols.map(c => `"'"`, c.type === 'string' ? c.name : `Strings.toString(${c.name})`, `"'"`).join(', \n    ",\\"'));
        parts.push(`"\\")"`);
    } else if (verb === 'CREATE TABLE') {
        parts.push(`"${table} ("`);
        parts.push(cols.map(c => `"${c.name} ${c.type.toUpperCase()}"`).join(', \n    ",\\"'));
        parts.push(`"\\")"`);
    } else if (verb === 'DELETE FROM') {
        parts.push(`"${table}"`);
    } else {
        parts.push(cols.map(c => `"${c.name}"`).join(', \n    ",\\"'));
        parts.push(`" FROM ${table}"`);
    }
    
    if (whereCol && whereVal) {
        parts.push(`" WHERE ${whereCol} ${whereOp} '${escapeSolidity(whereVal)}'"`);
    }
    
    if (verb === 'UPDATE') {
        parts.unshift(`"${verb} ${table} SET "`);
        parts = [`"${verb} ${table} SET "`, 
            cols.map(c => `"${c.name} = '"`, c.type === 'string' ? c.name : `Strings.toString(${c.name})`, `"'"`).join(', \n    ",\\"')];
        if (whereCol && whereVal) {
            parts.push(`" WHERE ${whereCol} ${whereOp} '${escapeSolidity(whereVal)}'"`);
        }
    }
    
    // Build full Solidity
    let concatParts = parts.map(p => `            ${p}`).join(',\n');
    
    let solidity = 
`// SPDX-License-Identifier: MIT
pragma solidity ^0.8.19;

import "@tableland/evm/contracts/utils/TablelandDeployments.sol";
import "@tableland/evm/contracts/utils/SQLHelpers.sol";
import "@openzeppelin/contracts/utils/Strings.sol";

contract QueryGenerator {
    function generateQuery(${cols.map(c => `${c.type} ${c.name}`).join(', ')})
        public pure returns (string memory)
    {
        return string.concat(
${concatParts}
        );
    }
}`;

    document.getElementById('output').textContent = solidity;
}

function copyOutput() {
    const output = document.getElementById('output').textContent;
    navigator.clipboard.writeText(output).then(() => {
        const btn = event.target;
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}

// Auto-generate on load
generate();
</script>
</body>
</html>
